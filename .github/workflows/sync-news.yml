name: Sync Noticias Novastra

on:
  schedule:
    - cron: "30 3 * * *" # Diario
    - cron: "0 4 * * 0"  # Semanal extra (domingo)
  workflow_dispatch:

jobs:
  sync-news:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar sync de noticias
        run: |
          curl --retry 5 --retry-delay 20 --retry-all-errors --fail-with-body \
          -H "x-sync-secret: ${{ secrets.SYNC_SECRET }}" \
          "https://novastra-api.onrender.com/api/sync-news"
